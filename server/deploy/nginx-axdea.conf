# axdea.hakjisa.kr → Express 웹서버(127.0.0.1:5114) 리버스 프록시
# 설치: /etc/nginx/sites-available/axdea 로 복사 → sites-enabled 에 심볼릭 링크 → nginx -t → reload
# HTTPS: sudo certbot --nginx -d axdea.hakjisa.kr 실행하면 아래 80 블록에 인증서/443이 자동 추가됩니다.

server {
    listen 80;
    listen [::]:80;
    server_name axdea.hakjisa.kr;

    # 요청 크기 여유 (아바타/본문 등)
    client_max_body_size 2m;

    location / {
        proxy_pass         http://127.0.0.1:5114;   # Express 웹서버(PORT)
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
